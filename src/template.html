<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CDM 2026 — Bilan SHRS Football Club</title>
<style>
:root{--bg1:#0a0e27;--bg2:#141b3c;--gold:#FFD166;--ink:#eef1ff;--muted:#9aa3c7;}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(160deg,var(--bg1),var(--bg2));color:var(--ink);font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;position:relative;min-height:100vh;overflow-x:hidden;}
#app{max-width:1100px;margin:0 auto;padding:20px;position:relative;}

/* -- Ambiance "stade nocturne" : faisceaux de projecteurs très discrets -- */
.beams{position:absolute;top:0;left:50%;width:1400px;height:520px;translate:-50% 0;pointer-events:none;z-index:0;
  background:
    conic-gradient(from 200deg at 20% 0%, #ffffff14 0deg 8deg, transparent 9deg 360deg),
    conic-gradient(from 160deg at 80% 0%, #ffffff14 0deg 8deg, transparent 9deg 360deg);
  filter:blur(2px);opacity:.8;}
@media (prefers-reduced-motion: no-preference){
  .beams{animation:sway 10s ease-in-out infinite alternate}
}
@keyframes sway{from{opacity:.55}to{opacity:.9}}

.hero{text-align:center;padding:34px 12px 10px;position:relative;z-index:1}
.hero .trophy{font-size:44px;filter:drop-shadow(0 0 14px var(--gold));animation:float 3.6s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hero h1{margin:6px 0;font-size:30px;letter-spacing:2px;
  background:linear-gradient(90deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero .sub{color:var(--muted);margin:2px}
.hero .upd{color:var(--gold);font-size:13px;letter-spacing:1px}
.nav{position:sticky;top:0;z-index:5;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
  padding:10px;background:rgba(10,14,39,.75);backdrop-filter:blur(8px);border-bottom:1px solid #ffffff14}
.nav a{color:var(--ink);text-decoration:none;font-size:14px;padding:6px 12px;border-radius:20px;border:1px solid #ffffff22;transition:background .15s,box-shadow .15s,border-color .15s}
.nav a:hover{background:#ffffff14;box-shadow:0 0 12px #ffffff22}
.nav a:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.nav a.active{background:#ffffff1f;border-color:var(--gold);color:var(--gold);box-shadow:0 0 12px #ffd16655}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;margin:26px 0;position:relative;z-index:1}
.podium .step{text-align:center;background:#ffffff0d;border:1px solid var(--c);border-radius:12px;padding:14px 16px;min-width:96px;
  box-shadow:0 0 18px color-mix(in srgb,var(--c) 45%,transparent)}
.podium .step-1{padding-bottom:38px}
.podium .step-2{padding-bottom:22px}
.podium .medal{font-size:30px}
.podium .pname{font-weight:700;color:var(--c)}
.podium .ppts{color:var(--muted);font-size:13px}
/* Flammes SVG autour du 1er (diffuses au-dessus de la carte) */
.flames{position:absolute;left:50%;top:-62px;translate:-50% 0;width:160px;height:112px;z-index:0;pointer-events:none;
  filter:blur(.6px) drop-shadow(0 0 18px #ff6a0088)}
.step-1 .medal,.step-1 .avt-lg,.step-1 .pname,.step-1 .ppts{position:relative;z-index:1}
.fl{transform-origin:50% 100%;animation:flick 1s ease-in-out infinite alternate}
.fl1{animation-duration:.9s}
.fl2{animation-duration:.72s}
.fl3{animation-duration:1.25s;animation-delay:.15s}
.fl4{animation-duration:1.4s;animation-delay:.2s}
.fl5{animation-duration:1.1s;animation-delay:.08s}
.flcore{transform-origin:50% 100%;animation:flick .6s ease-in-out infinite alternate}
.flglow{transform-origin:50% 74%;animation:glowpulse 2.2s ease-in-out infinite alternate}
@keyframes flick{0%{transform:scaleY(.88) scaleX(1.03);opacity:.78}100%{transform:scaleY(1.14) scaleX(.92);opacity:1}}
@keyframes glowpulse{0%{opacity:.55;transform:scale(.94)}100%{opacity:.9;transform:scale(1.06)}}
/* Feux d'artifice de fin de tournoi (rendus seulement quand tout est joué) */
.podium.celebrate{padding-top:34px}
.fireworks{position:absolute;left:0;right:0;top:-30px;height:150px;z-index:0;pointer-events:none;overflow:visible}
.fw{position:absolute;width:4px;height:4px;border-radius:50%;opacity:0;transform:scale(.1);
  animation:fw-burst 2.4s ease-out infinite}
.fw::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:
  40px 0 0 0 var(--fw),35px -20px 0 0 var(--fw),20px -35px 0 0 var(--fw),0 -40px 0 0 var(--fw),
  -20px -35px 0 0 var(--fw),-35px -20px 0 0 var(--fw),-40px 0 0 0 var(--fw),-35px 20px 0 0 var(--fw),
  -20px 35px 0 0 var(--fw),0 40px 0 0 var(--fw),20px 35px 0 0 var(--fw),35px 20px 0 0 var(--fw)}
.fw1{left:14%;--fw:#ffd166;animation-delay:0s}
.fw2{left:38%;--fw:#ff6b6b;animation-delay:.5s;top:14px}
.fw3{left:62%;--fw:#38d996;animation-delay:1s;top:6px}
.fw4{left:84%;--fw:#4d8bff;animation-delay:1.5s}
.fw5{left:50%;--fw:#ff9f1c;animation-delay:.8s;top:-8px}
@keyframes fw-burst{0%{opacity:0;transform:scale(.1)}12%{opacity:1}55%{opacity:1}100%{opacity:0;transform:scale(1)}}
/* Le Rescapé (avant-dernier) : vrai trophée, à côté du podium */
.podium .consol{margin-left:26px;padding-bottom:10px;cursor:pointer}
.podium .consol .medal{font-size:26px;filter:drop-shadow(0 0 7px #d9a441)}
.consol-label{margin-top:6px;font-size:11px;font-weight:700;color:#e6bd63;white-space:nowrap}
@keyframes pop{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
.podium .step{animation:pop .5s ease both}
.podium .step-1{animation-delay:.15s}
@media (prefers-reduced-motion: reduce){
  .hero .trophy{animation:none}
  .podium .step{animation:none}
  .fl,.flcore,.flglow{animation:none}
  .fw{animation:none;opacity:.55;transform:scale(.7)}
  .beams{animation:none}
}

.card{background:#ffffff0a;border:1px solid #ffffff1a;border-radius:16px;padding:16px 18px;margin:22px 0;
  box-shadow:0 8px 30px #00000040}
.card h2{margin:0 0 12px;font-size:20px}
.tabs{display:flex;gap:8px;margin-bottom:10px}
.tab{background:#ffffff10;color:var(--ink);border:1px solid #ffffff22;border-radius:20px;padding:6px 14px;cursor:pointer}
.tab.active{background:var(--gold);color:#141b3c;font-weight:700}
.replay{display:flex;align-items:center;gap:12px;margin-top:12px}
.replay input[type=range]{flex:1;accent-color:var(--gold)}
.muted{color:var(--muted);font-size:13px;min-width:52px}
.twrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;font-size:15px}
.tbl th{color:var(--muted);text-align:left;font-weight:500;padding:8px 10px;border-bottom:1px solid #ffffff22}
.tbl td{padding:9px 10px;border-bottom:1px solid #ffffff10}
.tbl .rk{font-size:18px;text-align:center;width:44px}
.tbl .ps{color:var(--muted)}
.tbl .dp{text-align:right;color:var(--muted)}
.tbl .tot{text-align:right;font-weight:700;color:var(--gold)}
.tbl .ev{text-align:center}
.up{color:#38d996}.down{color:#ff6b6b}.flat{color:#6b739c}
.tbl .row-avd{background:#d9a4411f}
.tbl .row-avd .rk{cursor:help;filter:drop-shadow(0 0 4px #d9a441)}
.tbl .row-leader{background:linear-gradient(90deg,#ffd16630,#ffd1660a)}
.tbl .row-leader td:first-child{box-shadow:inset 3px 0 0 var(--gold)}
.tbl .row-leader .rk{cursor:help;filter:drop-shadow(0 0 5px var(--gold))}
.tbl .row-leader .pname-cell{font-weight:800}
.avt{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;border-radius:50%;
  background:var(--c);color:#0a0e27;font-weight:800;font-size:16px;overflow:hidden;flex:0 0 auto;
  border:2px solid color-mix(in srgb,var(--c) 70%,#fff)}
.avt img{width:100%;height:100%;object-fit:cover}
.avt-wrap{position:relative;display:inline-flex;flex:0 0 auto}
.dunce-cap{position:absolute;left:50%;top:-19px;width:30px;height:32px;translate:-50% 0;z-index:4;
  overflow:visible;pointer-events:none;filter:drop-shadow(0 2px 2px rgba(0,0,0,.35))}
.dunce-wobble{transform-origin:30px 51px;animation:duncewob 2.6s ease-in-out infinite}
@keyframes duncewob{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
.avt-lg{width:56px;height:56px;font-size:22px;margin:2px auto 6px}
.pname-cell{display:inline-flex;align-items:center;gap:9px}
.podium .step .avt-lg{display:flex}
.pv{background:#ffffff10;color:var(--ink);border:1px solid #ffffff22;border-radius:20px;padding:6px 14px;cursor:pointer}
.pv.active{background:var(--gold);color:#141b3c;font-weight:700}
.pv-controls{margin:6px 0 12px}
.pv-controls select{background:#141b3c;color:var(--ink);border:1px solid #ffffff33;border-radius:8px;padding:6px 10px}
.pill{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:12px;font-weight:700;color:#0a0e27}
.st-exact{background:#38d996}.st-result{background:var(--gold)}.st-miss{background:#ff6b6b}
.st-pending{background:#3a4270;color:#aab}
.tbl.grid th.vth{writing-mode:vertical-rl;transform:rotate(180deg);height:70px;font-size:12px}
.tbl.grid th.vth-leader{background:#ffd16626;border-radius:6px 6px 0 0;font-weight:800}
.tbl.grid td.gcol-leader{background:#ffd16614}
.tbl.grid tbody tr:hover td.gcol-leader{background:#ffd16622}
.grid-legend{display:flex;gap:16px;flex-wrap:wrap;align-items:center;margin:2px 0 14px;font-size:13px;color:var(--muted)}
.grid-legend .pill{margin-right:6px;width:20px;height:20px}
.grid-legend-hint{font-style:italic;opacity:.8}
.gcell{cursor:default}
.grid-tip,.hint-tip{position:fixed;z-index:30;display:none;pointer-events:none;max-width:260px;
  background:#141b3c;border:1px solid #ffffff33;border-radius:8px;padding:8px 11px;
  font-size:13px;line-height:1.5;color:#fff;box-shadow:0 6px 20px #00000066}
.grid-tip b{color:var(--gold)}
.badge[data-hint]{cursor:help}
.tbl .mcol{white-space:nowrap;font-size:13px}
.stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px}
.stat{background:#ffffff0d;border:1px solid #ffffff1a;border-radius:12px;padding:10px 14px;min-width:110px}
.stat b{display:block;font-size:20px}.stat span{color:var(--muted);font-size:12px}
.mhead{font-size:17px;font-weight:600}
.prose{line-height:1.7;font-size:16px;color:#dfe4ff}
.prose b{color:#fff}
.foot{text-align:center;color:var(--muted);font-size:12px;padding:26px 0}
/* -- Comparateur 1v1 -- */
.cmp-picks{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.cmp-sel{flex:1;min-width:120px;background:#141b3c;color:var(--ink);border:1px solid #ffffff33;border-radius:8px;padding:6px 10px}
#cmpSwap{flex:0 0 auto}
.cmp-tbl{margin-top:6px}
.cmp-tbl td,.cmp-tbl th{text-align:center}
.cmp-tbl .cmp-a{text-align:right}
.cmp-tbl .cmp-b{text-align:left}
.cmp-tbl .cmp-mid{color:var(--muted);font-size:13px}
.cmp-tbl .lead{font-weight:800;color:var(--gold)}
/* -- Carte joueur (modale) -- */
.pname-link{cursor:pointer;text-decoration:underline dotted #ffffff44;text-underline-offset:3px}
.card-overlay{position:fixed;inset:0;z-index:20;background:#04061aee;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.pcard{position:relative;width:min(560px,100%);background:linear-gradient(160deg,#0d1330,#161d40);
  border:1px solid var(--c);border-radius:18px;padding:22px;box-shadow:0 0 40px color-mix(in srgb,var(--c) 55%,transparent)}
.pcard-close{position:absolute;top:12px;right:12px;background:#ffffff14;color:var(--ink);border:none;border-radius:8px;width:30px;height:30px;cursor:pointer;font-size:15px}
.pcard-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.pcard-avatar{width:56px;height:56px;border-radius:50%;background:var(--c);color:#0a0e27;font-weight:800;font-size:24px;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.pcard-avatar img{width:100%;height:100%;object-fit:cover}
.pcard-name{font-size:24px;font-weight:800;color:var(--c)}
.pcard-rank{margin-left:auto;font-size:34px;font-weight:800;color:var(--gold)}
.pcard-stats{display:flex;gap:12px;margin-bottom:14px}
.pcard-stats .stat{flex:1;text-align:center}
.pcard-line{padding:6px 0;border-top:1px solid #ffffff12;font-size:14px}
.pcard-line .muted{display:inline-block;min-width:120px}
.pcard-section-title{margin:16px 0 8px;font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--muted)}
.pcard-badges{display:flex;flex-wrap:wrap;gap:8px}
.card-badge{display:inline-flex;align-items:center;gap:7px;background:#ffffff12;border:1px solid var(--c);border-radius:20px;padding:3px 12px 3px 4px;font-size:13px}
.pcard-pronos{max-height:260px;overflow:auto;border:1px solid #ffffff12;border-radius:10px}
.pcard-pronos table{font-size:13px}
.pcard-pronos th{position:sticky;top:0;background:#141b3c;z-index:1}
.pcard-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.ctr{text-align:center}
/* Chips de rareté */
.rar{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.rar-1{background:#5aa9e633;color:#9cc9f0;border:1px solid #5aa9e6}
.rar-2{background:#2ec4b633;color:#8fe3d9;border:1px solid #2ec4b6}
.rar-3{background:#c77dff33;color:#dcb6ff;border:1px solid #c77dff}
.rar-4{background:#fb850033;color:#ffc078;border:1px solid #fb8500}
.rar-5{background:#ffd16633;color:var(--gold);border:1px solid var(--gold);box-shadow:0 0 8px #ffd16655}
/* -- Superlatifs / trophées -- */
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.badge{background:#ffffff0d;border:1px solid #ffffff1a;border-radius:14px;padding:14px;text-align:center;
  transition:transform .15s,box-shadow .15s}
.badge:hover{transform:translateY(-3px);box-shadow:0 0 20px #ffd16633}
.badge-emo{font-size:30px}
.badge-img{width:56px;height:56px;display:block;margin:0 auto}
.badge-img-sm{width:26px;height:26px}
.badge-title{font-weight:700;font-size:14px;margin:6px 0 2px}
.badge-who{font-weight:700;font-size:15px}
.badge-val{color:var(--gold);font-size:13px;font-weight:700}
.badge-detail{color:var(--muted);font-size:11px;margin-top:4px}
/* -- Résumé du match de la veille -- */
.recap{border-left:4px solid var(--gold);background:linear-gradient(100deg,#ffd16614,#ffffff08)}
.recap-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:8px}
.recap-score{font-size:22px;font-weight:800;letter-spacing:.5px;display:inline-flex;align-items:center;gap:8px;
  background:linear-gradient(90deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
.recap-cap{width:34px;height:34px;border-radius:50%;object-fit:cover;vertical-align:middle;
  border:2px solid #ffffff33;background:#0c1230;box-shadow:0 2px 6px #00000066,0 0 12px #ffd16640}
.recap-phase{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:1px}
.recap-body{line-height:1.65;font-size:15px;color:#dfe4ff}
.recap-body p{margin:8px 0}
.recap-body b{color:#fff}
.recap-match + .recap-match{margin-top:16px;padding-top:16px;border-top:1px solid #ffffff14}
/* -- Parcours des phases finales (bracket cinématique) -- */
.bracket{position:relative;margin:4px auto}
.bracket-svg{position:absolute;left:0;top:0;overflow:visible;pointer-events:none}
.bpath{fill:none;stroke:#5b6488;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;opacity:.5;
  stroke-dasharray:var(--len,680);pointer-events:stroke;transition:opacity .18s,stroke-width .18s,filter .18s}
/* équipe encore en course : trace dorée ; éliminée : trace froide et estompée */
.bpath-live{stroke:#ffd166;opacity:.7;stroke-width:2.6}
.bpath-out{stroke:#5b6488;opacity:.32;stroke-width:1.7}
/* trace vers le trophée : cachée par défaut, révélée seulement au survol d'une équipe en course */
.bpath-alive{stroke:#ffd166;stroke-dasharray:9 7;opacity:0;pointer-events:none}
.brk-leg{display:inline-flex;align-items:center;gap:5px;margin-left:14px;font-size:12px}
.brk-swatch{display:inline-block;width:16px;height:3px;border-radius:2px}
.brk-swatch.live{background:#ffd166}
.brk-swatch.out{background:#5b6488}
.bmatch{position:absolute;background:#141b3c;border:1px solid #ffffff22;border-radius:11px;overflow:hidden;font-size:13.5px;z-index:2;
  box-shadow:0 4px 14px #00000040}
.bteam{display:flex;align-items:center;gap:11px;padding:8px 14px;min-height:76px;box-sizing:border-box;cursor:pointer;transition:opacity .18s,background .18s,transform .18s}
.bteam+.bteam{border-top:1px solid #ffffff12}
.bteam .bname{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bteam .bscore{font-weight:700;color:var(--gold)}
.bcap-wrap{position:relative;flex:none;line-height:0;border-radius:50%}
.bcap{width:60px;height:60px;border-radius:50%;object-fit:cover;display:block;
  background:#0c1230;border:2px solid #ffffff33;box-shadow:0 2px 6px #00000066,0 0 0 1px #ffffff10;
  transition:transform .22s,border-color .22s,box-shadow .22s,filter .22s}
/* reflet lumineux (bulle brillante) */
.bcap-wrap::before{content:'';position:absolute;inset:0;border-radius:50%;pointer-events:none;z-index:2;
  background:radial-gradient(circle at 33% 24%,#ffffff70,transparent 46%);mix-blend-mode:screen;opacity:.7}
/* halo lumineux derrière l'avatar */
.bcap-wrap::after{content:'';position:absolute;inset:-6px;border-radius:50%;pointer-events:none;z-index:0;
  box-shadow:0 0 14px 3px transparent;opacity:0;transition:box-shadow .3s,opacity .3s}
.bteam[data-alive="1"] .bcap{box-shadow:0 2px 6px #00000066,0 0 14px #ffd16633}
.bteam[data-alive="1"] .bcap-wrap::after{opacity:.5;box-shadow:0 0 14px 2px #ffd16640}
.bteam[data-alive="0"] .bcap{filter:grayscale(1) brightness(.9);box-shadow:0 2px 6px #00000066,0 0 10px #5b648833}
.bteam:hover .bcap{transform:scale(1.14);border-color:var(--gold)}
.bwin{background:linear-gradient(90deg,transparent,#ffd16612)}
.bwin .bname{font-weight:800;color:#fff}
.bwin .bcap{border-color:var(--gold)}
.blose{opacity:.6}
@keyframes capPulse{0%,100%{box-shadow:0 0 16px 3px #ffd16655}50%{box-shadow:0 0 28px 8px #ffd166aa}}
/* tampon « ÉLIMINÉ » qui tombe sur le vaincu, cadencé sur le remplissage du fil */
.elim-stamp{position:absolute;z-index:10;pointer-events:none;
  font:800 9px/1 -apple-system,system-ui,sans-serif;letter-spacing:.6px;color:#fff;
  background:#e03131;border:2px solid #fff;border-radius:5px;padding:3px 5px;white-space:nowrap;
  box-shadow:0 4px 12px #00000080,0 0 0 3px #e0313140;
  transform:translate(-50%,-50%) rotate(-13deg);
  animation:stampDrop .5s cubic-bezier(.3,1.35,.45,1) both}
@keyframes stampDrop{
  0%{opacity:0;transform:translate(-50%,-320%) rotate(-13deg) scale(1.8)}
  55%{opacity:1;transform:translate(-50%,-50%) rotate(-13deg) scale(.82)}
  75%{transform:translate(-50%,-50%) rotate(-13deg) scale(1.1)}
  100%{opacity:1;transform:translate(-50%,-50%) rotate(-13deg) scale(1)}}
.btrophy{position:absolute;font-size:34px;z-index:3;filter:drop-shadow(0 0 10px var(--gold));animation:float 3.6s ease-in-out infinite}
.btrophy-halo{position:absolute;left:50%;top:50%;width:70px;height:70px;translate:-50% -50%;border-radius:50%;z-index:-1;
  background:radial-gradient(circle,#ffd16655,transparent 70%);animation:halo 2.4s ease-in-out infinite}
/* survol : parcours d'une équipe mis en valeur, différencié selon le statut */
.bracket.focus .bteam{opacity:.2}
.bracket.focus .bpath{opacity:.06}
.bracket.focus .bpath-alive{opacity:0}
/* équipe encore en course : le chemin se REMPLIT jusqu'à sa position (staggeré par tour),
   puis CONTINUE en pointillé animé vers le trophée */
.bracket.focus-live .bteam.hl{opacity:1;background:#ffd1662a;transform:scale(1.04)}
.bracket.focus-live .bteam.hl .bcap{border-color:var(--gold);transform:scale(1.16)}
.bracket.focus-live .bteam.hl .bcap-wrap::after{opacity:1;animation:capPulse 1.8s ease-in-out infinite}
.bracket.focus-live .bpath.bpath-live.hl{opacity:1;stroke:var(--gold);stroke-width:3.6;
  filter:drop-shadow(0 0 6px #ffd166aa);animation:bfill .34s calc(var(--seg,0)*.34s) linear both}
.bracket.focus-live .bpath.bpath-alive.hl{opacity:1;stroke:var(--gold);stroke-width:3;stroke-dasharray:9 7;
  filter:drop-shadow(0 0 6px #ffd16699);
  animation:bdashin .28s calc(var(--seg,0)*.34s) ease both, flow .7s calc(var(--seg,0)*.34s) linear infinite}
/* équipe éliminée : argenté, se remplit jusqu'au point d'élimination, sans trace vers le trophée */
.bracket.focus-out .bteam.hl{opacity:1;background:#9aa3c733;transform:scale(1.04)}
.bracket.focus-out .bteam.hl .bcap{border-color:#c9d0f5;transform:scale(1.14);filter:grayscale(.35) brightness(1)}
.bracket.focus-out .bteam.hl .bcap-wrap::after{opacity:1;box-shadow:0 0 18px 5px #c9d0f566}
.bracket.focus-out .bpath.bpath-out.hl{opacity:1;stroke:#c9d0f5;stroke-width:3.2;
  filter:drop-shadow(0 0 5px #c9d0f577);animation:bfill .34s calc(var(--seg,0)*.34s) linear both}
/* entrée cinématique au scroll (déclenchée par .played) */
.bracket:not(.played) .bmatch{opacity:0;transform:translateX(-16px) scale(.95)}
.bracket:not(.played) .bpath{stroke-dashoffset:var(--len,680)}
.bracket:not(.played) .bpath-alive{opacity:0}
.bracket:not(.played) .btrophy{opacity:0}
.bracket.played .bmatch{animation:bmIn .5s var(--d,0s) cubic-bezier(.2,.75,.2,1) both}
.bracket.played .bpath:not(.bpath-alive){stroke-dasharray:var(--len,680);animation:bdraw .6s var(--d,0s) ease both}
.bracket.played .btrophy{animation:btIn .7s var(--d,0s) cubic-bezier(.2,.85,.25,1.4) both, float 3.6s var(--d,0s) ease-in-out infinite}
@keyframes bmIn{from{opacity:0;transform:translateX(-16px) scale(.95)}to{opacity:1;transform:none}}
@keyframes bdraw{from{stroke-dashoffset:var(--len,680)}to{stroke-dashoffset:0}}
@keyframes bfill{from{stroke-dashoffset:var(--len,680)}to{stroke-dashoffset:0}}
@keyframes bdashin{from{opacity:0}to{opacity:1}}
@keyframes flow{to{stroke-dashoffset:-32}}
@keyframes btIn{from{opacity:0;transform:scale(.3) rotate(-18deg)}to{opacity:1;transform:none}}
@keyframes halo{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(.9)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}}
@media (prefers-reduced-motion: reduce){
  .btrophy,.btrophy-halo{animation:none}
  .bracket:not(.played) .bmatch,.bracket:not(.played) .bpath,.bracket:not(.played) .bpath-alive,.bracket:not(.played) .btrophy{opacity:1;transform:none;stroke-dashoffset:0}
  .bracket.played .bmatch,.bracket.played .bpath,.bracket.played .btrophy{animation:none}
  .bracket.focus-live .bpath.bpath-live.hl,.bracket.focus-out .bpath.bpath-out.hl{animation:none;stroke-dashoffset:0}
  .bracket.focus-live .bpath.bpath-alive.hl{animation:none;opacity:1}
  .bracket.focus-live .bteam.hl .bcap-wrap::after{animation:none}
  .elim-stamp{animation:none;opacity:1}
  .bracket:not(.played) .bfinal,.bracket:not(.played) .bpetite{opacity:1;transform:none}
  .bracket.played .bfinal,.bracket.played .bpetite{animation:none}
  .bfinal-cup{animation:none}
}
/* -- Affiche de finale : les deux finalistes face à face autour de la Coupe du Monde -- */
.bfinal{position:absolute;z-index:3;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:12px 14px 10px;border-radius:16px;border:1px solid #ffd16655;
  background:radial-gradient(130% 120% at 50% -10%,#20295a,#0f14340);
  box-shadow:0 10px 34px #00000066,0 0 0 1px #ffd1661f,inset 0 1px 30px #ffd1660e}
.bfinal-done{border-color:var(--gold);box-shadow:0 10px 34px #00000066,0 0 0 1px #ffd16655,inset 0 1px 40px #ffd16618}
.bfinal-title{font:800 12px/1 -apple-system,system-ui,sans-serif;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
.bfinal-duel{display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.bfside{flex:1;min-width:0;flex-direction:column;align-items:center;gap:6px;padding:4px 2px;min-height:0;text-align:center;
  border:none!important;background:none}
.bfside .bcap{width:64px;height:64px}
.bfname{display:inline-flex;align-items:center;gap:6px;max-width:100%;font-weight:700}
.bfname .bname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
.bfside .bscore{font-size:17px}
.bfinal-cup{flex:0 0 auto;position:relative;font-size:44px;line-height:1;filter:drop-shadow(0 0 12px var(--gold));
  animation:float 3.6s ease-in-out infinite}
.bfinal-meta{font-size:11px;color:var(--muted);white-space:nowrap}
.bfinal-done .bfinal-meta{color:var(--gold);font-weight:700}
/* petite finale (3e place) : plus discrète, sous l'affiche */
.bpetite{position:absolute;z-index:3;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  padding:8px 12px;border-radius:12px;border:1px dashed #ffffff26;background:#101736aa}
.bpetite-title{font:700 10.5px/1 -apple-system,system-ui,sans-serif;letter-spacing:1.4px;text-transform:uppercase;color:var(--muted)}
.bpetite-duel{display:flex;align-items:center;gap:10px;font-size:13.5px}
.bpetite-vs{color:var(--muted);font-weight:700}
.bmini{display:inline-flex;align-items:center;gap:6px;cursor:pointer;transition:opacity .18s,transform .18s}
.bmini .bname{white-space:nowrap}
.bmini .bscore{font-weight:700;color:var(--gold)}
.bmini:hover{transform:scale(1.05)}
/* entrée cinématique de l'affiche + petite finale (au scroll) */
.bracket:not(.played) .bfinal,.bracket:not(.played) .bpetite{opacity:0;transform:translateY(16px) scale(.94)}
.bracket.played .bfinal,.bracket.played .bpetite{animation:bfinIn .6s var(--d,1s) cubic-bezier(.2,.8,.25,1.2) both}
@keyframes bfinIn{from{opacity:0;transform:translateY(16px) scale(.94)}to{opacity:1;transform:none}}
/* survol : les finalistes (.bfside sont des .bteam, déjà gérés) et la 3e place s'estompent,
   sauf l'équipe survolée. On évite d'estomper le conteneur .bfinal (l'opacité du parent
   plafonnerait celle de l'enfant mis en valeur). */
.bracket.focus .bfinal-title,.bracket.focus .bfinal-cup,.bracket.focus .bfinal-meta,
.bracket.focus .bpetite-title,.bracket.focus .bpetite-vs{opacity:.25}
.bracket.focus .bmini{opacity:.25}
.bracket.focus .bmini.hl{opacity:1;transform:scale(1.05)}

/* ==== Affiche de finale : ambiance « sous tension » (pouls doré + balayage lumineux) ==== */
@keyframes fhGlow{
  0%,100%{box-shadow:0 10px 40px #00000066,0 0 0 1px #ffd16640,0 0 34px #ffd16618}
  50%{box-shadow:0 10px 46px #00000077,0 0 0 1px #ffd166b3,0 0 72px 8px #ffd16650}}
@keyframes fhSweep{0%{transform:translateX(-170%) rotate(8deg)}
  24%,100%{transform:translateX(380%) rotate(8deg)}}
@keyframes fhCup{0%,100%{transform:translateY(0) scale(1);filter:drop-shadow(0 0 10px #ffd166)}
  50%{transform:translateY(-4px) scale(1.07);filter:drop-shadow(0 0 22px #ffd166)}}
/* --- grande affiche header, juste sous les onglets --- */
.final-hero{max-width:760px;margin:8px auto 6px;animation:fadeUp .7s .2s both}
.fh-poster{position:relative;overflow:hidden;border-radius:18px;padding:12px 12px 10px;
  border:1px solid #ffd16655;background:radial-gradient(120% 130% at 50% -20%,#26305f 0%,#141b3c 55%,#0e1330 100%);
  box-shadow:0 10px 40px #00000066,0 0 0 1px #ffd16640;animation:fhGlow 1.5s ease-in-out infinite}
.fh-shine,.bfinal-shine{position:absolute;inset:0;border-radius:inherit;overflow:hidden;pointer-events:none;z-index:4}
.fh-shine::before{content:'';position:absolute;top:-30%;left:0;width:24%;height:160%;
  background:linear-gradient(100deg,transparent,#ffffff5c 46%,#ffffff85 50%,transparent);
  transform:translateX(-170%) rotate(8deg);animation:fhSweep 5s ease-in-out infinite}
.fh-tag{position:relative;z-index:6;text-align:center;font:800 12px/1 -apple-system,system-ui,sans-serif;letter-spacing:3px;
  text-transform:uppercase;color:var(--gold);margin-bottom:10px}
/* confrontation : deux grands portraits rectangulaires qui se font face, séparés par une
   diagonale, avec la Coupe + VS par-dessus la jointure. Les images remplissent le conteneur. */
.fh-duel{position:relative;display:flex;gap:0;height:clamp(240px,42vw,340px);border-radius:14px;overflow:hidden;background:#0a0f2c}
.fh-team{position:relative;flex:1;min-width:0;height:100%}
.fh-team-l{clip-path:polygon(0 0,100% 0,calc(100% - 44px) 100%,0 100%)}
.fh-team-r{margin-left:-44px;clip-path:polygon(44px 0,100% 0,100% 100%,0 100%)}
.fh-capwrap{display:block;width:100%;height:100%;line-height:0;border-radius:0}
.fh-cap{width:100%;height:100%;border-radius:0;object-fit:cover;object-position:center 20%;
  border:none;box-shadow:none;background:#0c1230}
.fh-cap.cap-empty{display:flex;align-items:center;justify-content:center;font-size:72px;font-weight:800;color:#fff;text-transform:uppercase}
/* voile dégradé sous chaque portrait pour lire le nom du pays */
.fh-team::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(to top,#080d28f2 4%,#080d2855 30%,transparent 52%)}
.fh-lose{filter:grayscale(.72) brightness(.72)}
.fh-country{position:absolute;left:0;right:0;bottom:0;z-index:3;display:flex;align-items:center;justify-content:center;gap:9px;
  padding:0 12px 13px;font-weight:800;font-size:clamp(16px,2.3vw,22px);white-space:nowrap;text-shadow:0 2px 8px #000}
.fh-team-l .fh-country{padding-right:44px}
.fh-team-r .fh-country{padding-left:44px}
.fh-win .fh-country{color:var(--gold)}
.fh-flag{font-size:1.2em}
.fh-center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;
  display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;text-align:center}
.fh-cup{font-size:clamp(42px,6vw,60px);line-height:1;animation:fhCup 1.5s ease-in-out infinite;filter:drop-shadow(0 3px 10px #000)}
.fh-vs{font:900 clamp(22px,3.4vw,34px)/1 -apple-system,system-ui,sans-serif;letter-spacing:1px;color:#fff;
  padding:5px 15px;border-radius:999px;background:#0b1030d9;border:2px solid var(--gold);box-shadow:0 0 20px #ffd16680}
.fh-score{font:900 clamp(26px,4vw,36px)/1 -apple-system,system-ui,sans-serif;color:var(--gold);white-space:nowrap;
  padding:5px 16px;border-radius:12px;background:#0b1030d9;border:2px solid var(--gold)}
.fh-dash{margin:0 7px;color:#ffffff99}
.fh-meta{display:flex;flex-direction:column;align-items:center;gap:2px;margin-top:12px;font-size:12.5px;color:var(--muted)}
.fh-loc{color:#cbd3f5}
.fh-done .fh-poster{border-color:var(--gold)}
/* petite finale, en petit sous l'affiche */
.fh-petite{max-width:560px;margin:8px auto 0;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap;
  padding:7px 15px;border-radius:11px;border:1px dashed #ffffff26;background:#101736aa;font-size:13px}
.fh-petite-tag{font:700 10.5px/1 -apple-system,system-ui,sans-serif;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted)}
.fh-petite-duel{font-weight:600}
.fh-petite-duel b{color:var(--muted);margin:0 5px;font-weight:700}
.fh-pf{margin-right:3px}
.fh-petite-meta{color:var(--muted);font-size:12px}
/* --- brillance identique sur l'affiche centrale du bracket --- */
.bfinal-shine::before{content:'';position:absolute;top:-30%;left:0;width:24%;height:160%;
  background:linear-gradient(100deg,transparent,#ffffff4d 48%,transparent);
  transform:translateX(-170%) rotate(8deg);animation:fhSweep 5s ease-in-out infinite}
.bracket.played .bfinal{animation:bfinIn .6s var(--d,1s) cubic-bezier(.2,.8,.25,1.2) both,fhGlow 1.5s 1.2s ease-in-out infinite}
.bfinal-cup{animation:fhCup 1.5s ease-in-out infinite}
.bfinal-when{font-size:11px;color:var(--muted);margin-top:1px}
.bfinal-champ{color:var(--gold);font-weight:800}
@media (prefers-reduced-motion: reduce){
  .fh-poster,.bracket.played .bfinal{animation:none}
  .fh-cup,.bfinal-cup{animation:none}
  .fh-shine,.bfinal-shine{display:none}
}
/* -- Favoris (champion / buteur) : classement + carte -- */
.fav-item{display:inline-flex;align-items:center;gap:8px;font-weight:600;white-space:nowrap}
.fav-img{width:26px;height:26px;object-fit:contain;flex:0 0 auto}
.fav-round{border-radius:50%;object-fit:cover;background:#ffffff10}
.fav-out{opacity:.6}
.fav-x{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:#ff6b6b;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle}
.tbl .fav-col{font-size:13px}
.pcard-favs{display:flex;gap:10px;margin-top:14px}
.pcard-fav{flex:1;background:#ffffff0d;border:1px solid #ffffff1a;border-radius:12px;padding:10px 12px;min-width:0}

.rare-sub{font-size:15px;color:var(--gold);margin:14px 0 8px}

.rare-item:hover{transform:translateX(4px);background:#ffffff08}

/* ============ Dynamisme : transitions, révélation, SVG ============ */
/* Entrée du hero + nav au chargement */
.hero,.nav{animation:fadeUp .7s ease both}
.nav{animation-delay:.12s}
@keyframes fadeUp{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
/* Trait doré qui se dessine sous le titre (SVG) */
.hero-underline{display:block;width:min(340px,72%);height:16px;margin:2px auto 6px}
.hero-underline path{stroke-dasharray:340;stroke-dashoffset:340;
  animation:draw 1.4s .3s cubic-bezier(.6,0,.2,1) forwards, ushimmer 3.4s 1.9s ease-in-out infinite}
@keyframes draw{to{stroke-dashoffset:0}}
@keyframes ushimmer{0%,100%{filter:drop-shadow(0 0 2px #ffd16680)}50%{filter:drop-shadow(0 0 9px #ffd166cc)}}
/* Révélation fluide des sections au scroll */
.card,.podium{opacity:0;transform:translateY(26px);transition:opacity .6s ease,transform .6s cubic-bezier(.2,.7,.2,1)}
.card.in,.podium.in{opacity:1;transform:none}
/* Micro-interactions */
.tbl tbody tr{transition:background .18s}
.tbl tbody tr:hover{background:#ffffff08}
.pill{transition:transform .15s ease,box-shadow .15s}
.pill:hover{transform:scale(1.18)}
.avt{transition:transform .2s ease,box-shadow .2s}
.pname-link:hover .avt{transform:scale(1.12);box-shadow:0 0 10px color-mix(in srgb,var(--c) 60%,transparent)}
.tab,.pv,.nav a{transition:background .2s,color .2s,box-shadow .2s,border-color .2s,transform .1s}
.tab:active,.pv:active{transform:translateY(1px)}
.fav-img{transition:transform .2s}
.fav-item:hover .fav-img{transform:scale(1.14)}
/* Entrée de la carte joueur (modale) */
.card-overlay{animation:ovIn .25s ease}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.pcard{animation:cardIn .38s cubic-bezier(.2,.8,.2,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
/* Brillance qui balaie les médaillons de badges */
.badge{position:relative;overflow:hidden}
.badge::after{content:"";position:absolute;top:-60%;left:-130%;width:55%;height:220%;
  background:linear-gradient(115deg,transparent,#ffffff4d,transparent);transform:rotate(12deg);pointer-events:none}
.badge:hover::after{animation:sweep .8s ease}
@keyframes sweep{to{left:140%}}
.badge-img{transition:transform .3s}
.badge:hover .badge-img{transform:scale(1.08) rotate(-4deg)}
/* Respect de prefers-reduced-motion : on calme tout */
@media (prefers-reduced-motion: reduce){
  .hero,.nav{animation:none}
  .hero-underline path{stroke-dashoffset:0;animation:none}
  .card,.podium{opacity:1;transform:none;transition:none}
  .card-overlay,.pcard{animation:none}
  .badge:hover::after{animation:none}
  .rare-item:hover,.pill:hover,.pname-link:hover .avt,.fav-item:hover .fav-img,.badge:hover .badge-img{transform:none}
  .dunce-wobble{animation:none;transform:rotate(-4deg)}
}

  .tbl .ps,.tbl .dp,.tbl .ev{display:none}

  /* Podium : l'avant-dernier passe sous le trio (sa propre ligne) pour ne pas serrer */
  .podium{flex-wrap:wrap}

  .badges-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .pcard{padding:18px 14px}
  .pcard-stats{flex-wrap:wrap}
  .cmp-picks{gap:8px}
  /* indice de défilement horizontal pour la grille de pronos et le bracket */
  .twrap{-webkit-overflow-scrolling:touch}
}
